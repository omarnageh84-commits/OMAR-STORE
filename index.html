<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMAR STORE</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
</head>

<body>

    <header>
        <h1>👑 OMAR STORE</h1>
        <p>كل اللي محتاجه في مكان واحد</p>
        <input type="text" id="search" placeholder="ابحث عن المنتج المناسب...">
    </header>

    <!-- شريط التبويبات الأفقي الرئيسي -->
    <section class="main-tabs">
        <button class="tab-btn active" data-tab="all">🛍 كل المنتجات</button>
        <button class="tab-btn" data-tab="best">🔥 الاكثر طلبا</button>
        <button class="tab-btn" data-tab="new">🆕 وصل جديد</button>
        <button class="tab-btn" data-tab="offers">🎁 العروض</button>
    </section>

    <!-- أزرار الأقسام والتصنيفات -->
    <section class="categories"></section>

    <!-- شبكة عرض المنتجات الموحدة -->
    <section>
        <div id="allProducts" class="products"></div>
    </section>

    <!-- نافذة عرض التفاصيل المنبثقة (Modal) -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="js/script.js"></script>

</body>

</html>
